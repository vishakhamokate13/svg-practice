<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Cubic Bezier Curve</title>

    <style>
        .star{
            fill: gold;
            stroke: orange;
            stroke-width: 2px;
            stroke-linejoin: round;
            transition: 
            fill 5s cubic-bezier(0,.8,.94,.07);
        }
        .star:hover{
            transform: rotate(45deg);
            transform-origin: center;
    
        }

    </style>
</head>
<body>

    <svg viewBox="0 0 120 120" width="120" height="120">
        <polygon points="60,18,70,44,98,44,76,61,84,90
        ,60,72,36,90,44,61,22,44,50,44"
        class="star">
            
    </svg>
    
</body>
</html>
