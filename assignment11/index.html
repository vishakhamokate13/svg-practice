<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Transform Properties</title>
    <style>
        .svg-container{
            transition: transform 0.5s ease;

        }
        .rectangle-icon:hover {
            transform: scale(1.1) rotate(5deg);
        }
        .circle-icon:hover {
            transform: translateY(40px);

        }
    </style>
</head>
<body>

<h2>Transform Properties</h2>

<svg width="350" height="200" style="border:2px solid black; background:#f5f5f5;"
class="svg-container">
    <rect
        x="40"
        y="50"
        width="100"
        height="70"
        fill="royalblue"
        class="rectangle-icon"

    />
    <circle
        cx="250"
        cy="90"
        r="35"
        fill="tomato"
        class="circle-icon"
    />
</svg>

</body>
</html>
