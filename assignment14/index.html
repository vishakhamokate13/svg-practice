<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spinning Loader Animation</title>
    <style>
        .loader-circle{
            fill:none;
            stroke:aqua;
            stroke-width: 5px;
            stroke-dasharray: 100 120;
            transform-origin: center;
            animation: rotate 1s linear infinite;
            stroke-linecap: round;
        }
        .loader-bg-circle{
            fill:none;
            stroke: #e0e0e0;
            stroke-width: 5px;
        }
        @keyframes rotate {
            0%{
                transform: rotate(0deg);
            }
            100%{
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <svg viewBox="0 0 100 100"height="100"width="100">
        <circle cx="50" cy="50" r="20" class="loader-bg-circle"/>
         <circle cx="50" cy="50" r="20" class="loader-circle"/>
     </svg>
    
</body>
</html>
