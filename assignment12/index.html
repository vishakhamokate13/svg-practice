<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyframe Animations</title>
    <style>
        .my-box{
            fill:brown;
            animation: color-magic 5s infinite alternate ease-in-out;
        }

        @keyframes color-magic {
            0% {
                fill: #659287;
                height: 20px;
                width: 20px;
                transform: translateX(10px) rotate(10deg);
            }
            25%{
                fill: #88BDA4;
                height: 30px;
                width: 30px;
                transform: translateX(20px) rotate(20deg);
            
            }
            50%{
                fill: #B1D3B9;
                height: 40px;
                width: 40px;
                transform: translateX(30px) rotate(30deg);
            
            }
            75%{
                fill: #E6F2DD;
                height: 50px;
                width: 50px;
                transform: translateX(40px) rotate(40deg);
            
            }
            100%{
                fill: #c9fcef;
                height: 60px;
                width: 60px;
                transform: translateX(50px) rotate(50deg);
            
            }

        }

    </style>
</head>
<body>
    <svg viewBox="0 0 100 100" height="100" width="100">
        <rect x="20" y="20" width="30" height="30" rx="30"
        class="my-box"/>

    </svg>
    
</body>
</html>
